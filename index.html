<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Продолжить?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Nunito:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --plum:      #241733;
    --plum-deep: #160d22;
    --surface:   #fffdf9;
    --ink:       #1c1530;
    --ink-soft:  #6c6480;
    --yes:       #16a35a;
    --yes-deep:  #0f7e44;
    --no:        #ef4e5e;
    --no-deep:   #cf3447;
    --meh-a:     #16a35a;
    --meh-b:     #ef4e5e;
    --ring:      #8b5cf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: "Nunito", system-ui, sans-serif;
    background:
      radial-gradient(120% 120% at 50% -10%, #3a2554 0%, var(--plum) 45%, var(--plum-deep) 100%);
    padding: 24px;
    overflow: hidden;
  }

  /* floating question marks in the backdrop */
  .ambient { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .ambient span {
    position: absolute;
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800;
    color: rgba(255,255,255,0.04);
    user-select: none;
    animation: drift linear infinite;
  }
  @keyframes drift {
    from { transform: translateY(110vh) rotate(0deg); }
    to   { transform: translateY(-20vh) rotate(360deg); }
  }

  .modal {
    position: relative;
    width: min(440px, 100%);
    background: var(--surface);
    border-radius: 28px;
    padding: 44px 36px 32px;
    text-align: center;
    box-shadow:
      0 2px 0 rgba(0,0,0,0.04),
      0 40px 80px -24px rgba(20, 8, 40, 0.55);
    animation: pop 0.5s cubic-bezier(.2,1.3,.4,1) both;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(18px) scale(.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .glyph {
    width: 72px; height: 72px;
    margin: 0 auto 22px;
    display: grid; place-items: center;
    border-radius: 22px;
    background: linear-gradient(135deg, #f4eaff, #e7d6ff);
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800;
    font-size: 42px;
    color: #6d35c4;
    animation: bob 3.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-6px) rotate(3deg); }
  }

  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800;
    font-size: 40px;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
  }

  .sub {
    margin: 12px auto 30px;
    max-width: 26ch;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
  }

  .buttons {
    display: flex;
    gap: 12px;
  }
  @media (max-width: 420px) {
    .buttons { flex-direction: column; }
  }

  .btn {
    flex: 1;
    border: none;
    cursor: pointer;
    font-family: "Nunito", sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: #fff;
    padding: 15px 10px;
    border-radius: 16px;
    transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .btn:focus-visible {
    outline: 3px solid var(--ring);
    outline-offset: 3px;
  }
  .btn:active { transform: translateY(2px) scale(.97); }

  .btn--yes {
    background: linear-gradient(160deg, var(--yes), var(--yes-deep));
    box-shadow: 0 8px 18px -6px rgba(15,126,68,.6);
  }
  .btn--yes:hover { transform: translateY(-3px); box-shadow: 0 14px 24px -8px rgba(15,126,68,.7); }

  .btn--no {
    background: linear-gradient(160deg, var(--no), var(--no-deep));
    box-shadow: 0 8px 18px -6px rgba(207,52,71,.6);
  }
  .btn--no:hover { transform: translateY(-3px); box-shadow: 0 14px 24px -8px rgba(207,52,71,.7); }

  /* The star of the show: can't decide between Да and Нет, so it's literally both. */
  .btn--meh {
    background: linear-gradient(90deg, var(--meh-a), var(--meh-b), var(--meh-a));
    background-size: 250% 100%;
    box-shadow: 0 8px 18px -6px rgba(110,80,90,.5);
    animation: indecision 3.8s ease-in-out infinite, waver 4.5s ease-in-out infinite;
  }
  @keyframes indecision {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @keyframes waver {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }
  .btn--meh:hover {
    animation-duration: .35s, .25s; /* gets nervous when you approach */
  }

  .response {
    min-height: 26px;
    margin-top: 22px;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .3s ease, transform .3s ease;
  }
  .response.show { opacity: 1; transform: translateY(0); }
  .response small { display: block; font-weight: 600; color: var(--ink-soft); font-size: 13px; margin-top: 4px; }

  .reset {
    margin-top: 18px;
    background: none;
    border: none;
    font-family: "Nunito", sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease, color .15s ease;
  }
  .reset.show { opacity: 1; pointer-events: auto; }
  .reset:hover { color: var(--ink); }
  .reset:focus-visible { outline: 2px solid var(--ring); outline-offset: 3px; border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .001ms !important;
    }
  }
</style>
</head>
<body>

<div class="ambient" aria-hidden="true"></div>

<div class="modal" role="dialog" aria-modal="true" aria-labelledby="title">
  <div class="glyph" aria-hidden="true">?</div>
  <h1 id="title">Продолжить?</h1>
  <p class="sub">Серьёзный вопрос. Но кнопок целых три, так что есть из чего выбрать.</p>

  <div class="buttons">
    <button class="btn btn--yes" data-answer="yes">Да</button>
    <button class="btn btn--no"  data-answer="no">Нет</button>
    <button class="btn btn--meh" data-answer="meh">Вроде</button>
  </div>

  <div class="response" aria-live="polite" id="response"></div>
  <button class="reset" id="reset">Спросить ещё раз</button>
</div>

<script>
  // Floating question marks
  const ambient = document.querySelector('.ambient');
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('span');
    s.textContent = '?';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = (28 + Math.random() * 90) + 'px';
    s.style.animationDuration = (14 + Math.random() * 16) + 's';
    s.style.animationDelay = (-Math.random() * 20) + 's';
    ambient.appendChild(s);
  }

  const responses = {
    yes: [
      { line: 'Поехали! 🚀',        note: 'Решительность — это красиво.' },
      { line: 'Отличный выбор.',    note: 'Так держать.' },
      { line: 'Принято, продолжаем!', note: 'Ни шагу назад.' }
    ],
    no: [
      { line: 'Ну ладно, тормозим.', note: 'Иногда «нет» — это забота о себе.' },
      { line: 'Как скажешь.',         note: 'Уважаю границы.' },
      { line: 'Понял, отступаем.',    note: 'Тоже валидно.' }
    ],
    // The whole point: it never actually commits.
    meh: [
      { line: 'Ну... наверное?',           note: 'А может и нет. Сложно сказать.' },
      { line: '50 на 50.',                 note: 'Подброшу монетку — потом скажу.' },
      { line: 'Спроси меня позже.',        note: 'Сейчас как-то не до решений.' },
      { line: 'Хм. Это надо обдумать.',    note: 'Дня три. Или неделю.' },
      { line: 'И да, и нет.',              note: 'В основном «и».' },
      { line: '¯\\_(ツ)_/¯',               note: 'Вот прям точно вроде.' }
    ]
  };

  const buttons   = document.querySelectorAll('.btn');
  const responseEl = document.getElementById('response');
  const resetEl   = document.getElementById('reset');
  const mehSeen   = []; // remember which "Вроде" lines we've shown

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function pickMeh() {
    if (mehSeen.length >= responses.meh.length) mehSeen.length = 0;
    let r;
    do { r = pick(responses.meh); } while (mehSeen.includes(r.line));
    mehSeen.push(r.line);
    return r;
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.answer;
      const r = type === 'meh' ? pickMeh() : pick(responses[type]);

      responseEl.classList.remove('show');
      // tiny delay so the fade re-triggers on repeat clicks
      setTimeout(() => {
        responseEl.innerHTML = r.line + '<small>' + r.note + '</small>';
        responseEl.classList.add('show');
        resetEl.classList.add('show');
      }, 80);
    });
  });

  resetEl.addEventListener('click', () => {
    responseEl.classList.remove('show');
    resetEl.classList.remove('show');
    responseEl.textContent = '';
    document.querySelector('.btn--yes').focus();
  });
</script>

</body>
</html>
